<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .piano { display: flex; position: relative; margin-top: 50px; }
        .white { width: 50px; height: 150px; border: 1px solid #000; background: white; }
        .black { width: 35px; height: 100px; background: black; position: absolute; top: 0; }
    </style>
</head>
<body>
    <div id="game">クリックしてスタート</div>
    <div class="piano" id="piano" style="display:none;">
        <!-- 白鍵15枚 -->
        <div class="white"></div><div class="white"></div><div class="white"></div><div class="white"></div><div class="white"></div>
        <div class="white"></div><div class="white"></div><div class="white"></div><div class="white"></div><div class="white"></div>
        <div class="white"></div><div class="white"></div><div class="white"></div><div class="white"></div><div class="white"></div>
        
        <!-- 黒鍵10枚：白鍵の境目に正確に配置 -->
        <!-- 1オクターブ目 -->
        <div class="black" style="left:33px;"></div>  <div class="black" style="left:83px;"></div>
        <div class="black" style="left:183px;"></div> <div class="black" style="left:233px;"></div> <div class="black" style="left:283px;"></div>
        <!-- 2オクターブ目 -->
        <div class="black" style="left:383px;"></div> <div class="black" style="left:433px;"></div>
        <div class="black" style="left:533px;"></div> <div class="black" style="left:583px;"></div> <div class="black" style="left:633px;"></div>
    </div>
    <script>
        document.getElementById("game").onclick = function() {
            this.style.display = "none";
            document.getElementById("piano").style.display = "flex";
        };
    </script>
</body>
</html>
