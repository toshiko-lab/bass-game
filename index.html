<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号ゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #e6e6e6; }
        .box { background: white; width: 400px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        #staff { width: 350px; height: 150px; border: 1px solid #000; margin: 10px auto; position: relative; background: white; }
        .line { width: 300px; height: 1px; background: black; margin: 25px auto; }
        .key { width: 40px; height: 100px; background: white; border: 1px solid black; display: inline-block; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="timer">01:00</h2>
    <button onclick="alert('スタート！')">スタート</button>
    
    <div id="staff">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div style="width:20px; height:20px; background:black; border-radius:50%; position:absolute; top:70px; left:180px;"></div>
    </div>

    <div id="keyboard">
        <div class="key"></div>
        <div class="key"></div>
        <div class="key"></div>
        <div class="key"></div>
    </div>
</div>

</body>
</html>
