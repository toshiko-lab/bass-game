<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号ゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        .container { background: white; width: 450px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        
        #staff { width: 360px; height: 160px; border: 1px solid #ccc; margin: 10px auto; position: relative; background: white; }
        .line { width: 100%; height: 1px; background: black; position: absolute; }
        
        /* 音符サイズと位置（加線の上） */
        #note { width: 22px; height: 16px; border: 2px solid #000; border-radius: 50%; position: absolute; left: 170px; background: white; }
        #clef { position: absolute; left: 20px; top: 25px; font-size: 80px; line-height: 1; }

        /* ピアノ：黒鍵が重なるように設定（先生の主軸デザイン） */
        .piano-wrapper { display: inline-block; position: relative; margin-top: 20px; height: 120px; }
        .white-key { width: 40px; height: 120px; background: white; border: 1px solid #000; display: inline-block; cursor: pointer; }
        .black-key { width: 25px; height: 80px; background: black; position: absolute; top: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="timer">01:00</h1>
    <div id="staff">
        <div class="line" style="top:40px;"></div><div class="line" style="top:60px;"></div>
        <div class="line" style="top:80px;"></div><div class="line" style="top:100px;"></div>
        <div class="line" style="top:120px;"></div>
        <div id="clef">𝄢</div>
        <!-- 音符の位置を第1線に固定（透過設定済み） -->
        <div id="note" style="top:110px; background: white; z-index: 1;"></div>
    </div>
    
    <div class="piano-wrapper">
        <!-- 先生の意図通りの鍵盤配置（白鍵11枚・黒鍵8枚） -->
        <!-- 1組目: ド・ド#・レ・レ#・ミ -->
        <div class="white-key" style="left:0px;"></div><div class="black-key" style="left:28px;"></div>
        <div class="white-key" style="left:40px;"></div><div class="black-key" style="left:68px;"></div>
        <div class="white-key" style="left:80px;"></div>
        
        <!-- 2組目: ファ・ファ#・ソ・ソ#・ラ・ラ#・シ -->
        <div class="white-key" style="left:120px;"></div><div class="black-key" style="left:148px;"></div>
        <div class="white-key" style="left:160px;"></div><div class="black-key" style="left:188px;"></div>
        <div class="white-key" style="left:200px;"></div><div class="black-key" style="left:228px;"></div>
        <div class="white-key" style="left:240px;"></div>
    </div>
    <div id="score" style="margin-top:20px;">スタートを押してね</div>
</div>

</body>
</html>
