<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .piano { display: flex; margin-top: 50px; position: relative; }
        .white { width: 50px; height: 150px; border: 1px solid #000; background: white; }
        .black { width: 30px; height: 100px; background: black; position: absolute; top: 0; }
    </style>
</head>
<body>
    <div id="game">クリックしてスタート</div>
    <div class="piano" id="piano" style="display:none;">
        <div class="white"></div><div class="black" style="left:35px;"></div>
        <div class="white"></div><div class="black" style="left:85px;"></div>
        <div class="white"></div>
        <div class="white"></div><div class="black" style="left:185px;"></div>
        <div class="white"></div><div class="black" style="left:235px;"></div>
        <div class="white"></div><div class="black" style="left:285px;"></div>
        <div class="white"></div>
    </div>
    <script>
        document.getElementById("game").onclick = function() {
            this.style.display = "none";
            document.getElementById("piano").style.display = "flex";
        };
    </script>
</body>
</html>
