<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号ゲーム：最終手段</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #ffe4e1; }
        .container { background: white; width: 500px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        
        /* 全て新しいクラス名に変更しました */
        .x-piano-box { display: flex; justify-content: center; margin-top: 30px; height: 120px; }
        .x-w-key { width: 40px; height: 120px; background: white; border: 1px solid #000; z-index: 1; margin-left: -1px; }
        .x-b-key { width: 25px; height: 80px; background: black; z-index: 2; margin-left: -12.5px; margin-right: -12.5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>確認：ファ〜ラ鍵盤</h1>
    <div class="x-piano-box">
        <div class="x-w-key">F</div><div class="x-b-key"></div>
        <div class="x-w-key">G</div><div class="x-b-key"></div>
        <div class="x-w-key">A</div>
        <div class="x-w-key">B</div><div class="x-b-key"></div>
        <div class="x-w-key">C</div><div class="x-b-key"></div>
        <div class="x-w-key">D</div><div class="x-b-key"></div>
        <div class="x-w-key">E</div>
        <div class="x-w-key">F</div><div class="x-b-key"></div>
        <div class="x-w-key">G</div><div class="x-b-key"></div>
        <div class="x-w-key">A</div>
    </div>
</div>
</body>
</html>
