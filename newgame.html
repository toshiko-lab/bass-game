<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号ゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        .container { background: white; width: 450px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        .piano { display: flex; justify-content: center; margin-top: 20px; height: 120px; }
        .white-key { width: 40px; height: 120px; background: white; border: 1px solid #000; margin-left: -1px; cursor: pointer; }
        .black-key { width: 25px; height: 80px; background: black; margin-left: -12.5px; margin-right: -12.5px; z-index: 2; pointer-events: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>確認用：ファ〜ラ鍵盤</h1>
    <div class="piano">
        <div class="white-key">F</div>
        <div class="black-key"></div>
        <div class="white-key">G</div>
        <div class="black-key"></div>
        <div class="white-key">A</div>
        <div class="white-key">B</div>
        <div class="black-key"></div>
        <div class="white-key">C</div>
        <div class="black-key"></div>
        <div class="white-key">D</div>
        <div class="black-key"></div>
        <div class="white-key">E</div>
        <div class="white-key">F</div>
        <div class="black-key"></div>
        <div class="white-key">G</div>
        <div class="black-key"></div>
        <div class="white-key">A</div>
    </div>
</div>
</body>
</html>
