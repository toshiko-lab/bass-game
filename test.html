<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body style="text-align: center;">
    <div style="padding: 20px; font-size: 32px;">
        <button id="startBtn" onclick="startGame()" style="font-size: 28px;">START</button>
        <span id="timeDisplay">Time: 60</span>
        <span id="yesScore">YES: 0</span>
        <span id="noScore">NO: 0</span>
    </div>

    <!-- 五線譜 -->
    <canvas id="staffCanvas" width="800" height="300"></canvas>
    
    <!-- 鍵盤（IDをシンプルに再整理） -->
    <svg id="piano" onclick="handlePianoClick(event)" width="800" height="200" viewBox="0 0 800 200" style="cursor:pointer;">
        <!-- ド(key0)～シ(key6)の例。必要に応じてここを広げてください -->
        <rect id="key0" x="0" width="100" height="200" fill="white" stroke="black"/>
        <rect id="key1" x="100" width="100" height="200" fill="white" stroke="black"/>
        <rect id="key2" x="200" width="100" height="200" fill="white" stroke="black"/>
        <rect id="key3" x="300" width="100" height="200" fill="white" stroke="black"/>
        <rect id="key4" x="400" width="100" height="200" fill="white" stroke="black"/>
        <rect id="key5" x="500" width="100" height="200" fill="white" stroke="black"/>
        <rect id="key6" x="600" width="100" height="200" fill="white" stroke="black"/>
    </svg>

    <script>
        let osc, timerInterval, currentTargetKeyId = "";
        let yesCount = 0, noCount = 0;

        // ヘ音記号の第1線から第5線までのy座標（160, 140, 120, 100, 80）
        const notes = [
            { id: "key0", y: 160 }, // ド (下第1間)
            { id: "key1", y: 140 }, // レ (第1線)
            { id: "key2", y: 120 }, // ミ (第1間)
            { id: "key3", y: 100 }, // ファ (第2線)
            { id: "key4", y: 80 }   // ソ (第2間)
        ];

        function setup() { osc = new p5.Oscillator('triangle'); osc.start(); osc.amp(0); }

        function drawStaff() {
            let canvas = document.getElementById('staffCanvas');
            let ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath(); ctx.moveTo(100, 80 + i * 20); ctx.lineTo(700, 80 + i * 20); ctx.stroke();
            }
            ctx.font = "100px Arial"; ctx.fillText("𝄢", 20, 150);
        }

        function startGame() {
            yesCount = 0; noCount = 0;
            document.getElementById('yesScore').innerText = "YES: 0";
            document.getElementById('noScore').innerText = "NO: 0";
            showNextNote();
        }

        function showNextNote() {
            drawStaff();
            let ctx = document.getElementById('staffCanvas').getContext('2d');
            let n = notes[Math.floor(Math.random() * notes.length)];
            ctx.font = "40px Arial";
            ctx.fillText("○", 350, n.y + 10);
            currentTargetKeyId = n.id;
        }

        function handlePianoClick(event) {
            userStartAudio();
            let id = event.target.id;
            let freqs = { "key0": 130.8, "key1": 146.8, "key2": 164.8, "key3": 174.6, "key4": 196.0 };
            
            if (freqs[id]) {
                osc.freq(freqs[id]); osc.amp(0.3, 0.05);
                setTimeout(() => osc.amp(0, 0.1), 100);
                
                if (id === currentTargetKeyId) {
                    yesCount++;
                    document.getElementById('yesScore').innerText = "YES: " + yesCount;
                } else {
                    noCount++;
                    document.getElementById('noScore').innerText = "NO: " + noCount;
                }
                showNextNote();
            }
        }
    </script>
</body>
</html>
