<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body>
    <div id="game" style="font-size:30px; cursor:pointer; margin-top:50px;" onclick="startAudio();">クリックしてスタート</div>

    <!-- 先生のSVGにwidthとheightを明示的に指定して表示を固定します -->
    <svg id="piano" onclick="handlePianoClick(event)" width="1000" height="200" viewBox="0 0 1000 200" style="display:none; cursor:pointer;">
      <!-- 白鍵 -->
      <rect x="0" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="71.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="142.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="214.2" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="285.6" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="357" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="428.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="499.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="571.2" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="642.6" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="714" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="785.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="856.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect x="928.2" width="71.8" height="200" fill="white" stroke="black" stroke-width="2"/>

      <!-- 黒鍵 -->
      <rect x="50" y="0" width="40" height="120" fill="black"/>
      <rect x="121" y="0" width="40" height="120" fill="black"/>
      <rect x="263" y="0" width="40" height="120" fill="black"/>
      <rect x="334" y="0" width="40" height="120" fill="black"/>
      <rect x="405" y="0" width="40" height="120" fill="black"/>
      <rect x="548" y="0" width="40" height="120" fill="black"/>
      <rect x="619" y="0" width="40" height="120" fill="black"/>
      <rect x="761" y="0" width="40" height="120" fill="black"/>
      <rect x="832" y="0" width="40" height="120" fill="black"/>
      <rect x="903" y="0" width="40" height="120" fill="black"/>
    </svg>

   <script>
        let osc;
        function setup() { 
            osc = new p5.Oscillator('triangle'); 
            osc.start(); 
            osc.amp(0); 
        }
        
        function startAudio() {
            userStartAudio();
            document.getElementById('game').style.display = 'none';
            document.getElementById('piano').style.display = 'block';
        }

        function playNote(freq) {
            osc.freq(freq); 
            osc.amp(0.3, 0.02);
            setTimeout(() => osc.amp(0, 0.1), 100);
        }

        // 鍵盤をクリックした時の処理（IDで判定する正確な書き方です）
        function handlePianoClick(event) {
            const id = event.target.id;
            
            // 各IDに対して、正しい周波数を直接指定します
            const noteMap = {
                "key0": 98.00,  // ソ (G2)
                "key2": 110.00, // ラ (A2)
                "key4": 123.47, // シ (B2)
                "key5": 130.81, // ド (C3)
                "key7": 146.83, // レ (D3)
                "key9": 164.81, // ミ (E3)
                "key10": 174.61,// ファ (F3)
                "key12": 196.00 // ソ (G3)
            };

            // 音を鳴らす実行処理
            if (noteMap[id]) {
                playNote(noteMap[id]);
            } else {
                console.log("この鍵盤は音を割り当てていません: " + id);
            }
        }
    </script>
</body>
</html>
