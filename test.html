<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号 トレーニング</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: white; padding: 20px; }
        .score { font-size: 24px; margin-bottom: 20px; }
        /* ゲームエリア：譜面下に十分な加線スペースと鍵盤の距離を確保 */
        #gameArea { position: relative; display: inline-block; margin-bottom: 100px; }
        /* ヘ音記号位置の微調整 */
        #bassClef { position: absolute; left: 10px; top: 185px; width: 80px; pointer-events: none; }
        canvas { background: white; display: block; }
    </style>
</head>
<body>

<div class="score">
    <button onclick="startGame()" style="font-size: 20px;">START</button>
    <span id="yesScore" style="color:green; margin: 0 20px;">YES: 0</span>
    <span id="noScore" style="color:red;">NO: 0</span>
</div>

<div id="gameArea">
    <img id="bassClef" src="bass.png" alt="ヘ音記号">
    <canvas id="staffCanvas" width="800" height="400"></canvas>
</div>
<div id="pianoContainer"></div>

<script>
    let audioCtx, yesCount=0, noCount=0, currentTargetId;
    // 座標: 下第2線(ド)=320, 下第1間(レ)=300, 下第1線(ミ)=280, 第1間(ファ)=260, 第1線(ソ)=240
    const notes = [
        { id: "key0", y: 320 }, { id: "key2", y: 300 }, { id: "key4", y: 280 }, 
        { id: "key5", y: 260 }, { id: "key7", y: 240 }
    ];

    function createPiano() {
        let s = '<svg onclick="check(event)" width="600" height="150" viewBox="0 0 600 150">';
        for(let i=0; i<12; i++) s += `<rect id="key${i*2}" x="${i*50}" width="48" height="150" fill="white" stroke="black"/>`;
        let blackKeys = [1, 3, 6, 8, 10];
        blackKeys.forEach(i => s += `<rect id="key${i}" x="${(i/2*50) + 35}" width="30" height="90" fill="black"/>`);
        s += '</svg>';
        document.getElementById('pianoContainer').innerHTML = s;
    }

    function drawStaff() {
        let ctx = document.getElementById('staffCanvas').getContext('2d');
        ctx.clearRect(0,0,800,400);
        ctx.lineWidth = 2;
        // 五線を下方に配置
        for(let i=0; i<5; i++) {
            ctx.beginPath(); ctx.moveTo(50, 180 + i*40); ctx.lineTo(750, 180 + i*40); ctx.stroke();
        }
    }

    function drawNote(y) {
        let ctx = document.getElementById('staffCanvas').getContext('2d');
        ctx.beginPath(); ctx.ellipse(400, y, 25, 18, 0, 0, 7); ctx.stroke();
        // 加線の描画
        if(y >= 280) { ctx.beginPath(); ctx.moveTo(350, 280); ctx.lineTo(450, 280); ctx.stroke(); }
        if(y >= 320) { ctx.beginPath(); ctx.moveTo(350, 320); ctx.lineTo(450, 320); ctx.stroke(); }
    }

    function startGame() { yesCount=0; noCount=0; showNote(); }
    function showNote() {
        drawStaff();
        let n = notes[Math.floor(Math.random()*notes.length)];
        drawNote(n.y);
        currentTargetId = n.id;
    }

    function check(e) {
        if(!currentTargetId) return;
        if(e.target.id === currentTargetId) yesCount++; else noCount++;
        document.getElementById('yesScore').innerText = "YES: " + yesCount;
        document.getElementById('noScore').innerText = "NO: " + noCount;
        showNote();
    }
    window.onload = () => { drawStaff(); createPiano(); };
</script>
</body>
</html>
