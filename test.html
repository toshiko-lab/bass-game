<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif;">

   <!-- 1. 最上段UI：YES/NOの後に数字枠（初期値0）を配置 -->
<div id="ui-container" style="padding: 20px; font-size: 32px; display: flex; justify-content: center; gap: 30px; align-items: center;">
    <button style="font-size: 28px;">START</button>
    <span>Time: 00</span>
    <div>YES <input type="text" value="0" style="width: 50px; height: 35px; font-size: 28px; text-align: center;"></div>
    <div>NO <input type="text" value="0" style="width: 50px; height: 35px; font-size: 28px; text-align: center;"></div>
</div>

    <!-- 2. 中段：五線譜 -->
    <div id="staff-container">
        <canvas id="staffCanvas" width="800" height="350"></canvas>
    </div>

    <!-- 3. 下段：鍵盤（間隔を3間分＝120pxに設定） -->
    <svg id="piano" onclick="handlePianoClick(event)" width="1000" height="200" viewBox="0 0 1000 200" style="margin-top: 120px; cursor:pointer;">
        <!-- (鍵盤のrect要素は変更なし) -->
        <rect id="key0" x="0" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key1" x="71.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key2" x="142.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key3" x="214.2" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key4" x="285.6" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key5" x="357" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key6" x="428.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key7" x="499.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key8" x="571.2" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key9" x="642.6" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key10" x="714" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key11" x="785.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key12" x="856.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
        <rect id="key13" x="928.2" width="71.8" height="200" fill="white" stroke="black" stroke-width="2"/>
    </svg>

    <script>
        let osc;
        function setup() { osc = new p5.Oscillator('triangle'); osc.start(); osc.amp(0); }

       function setupStaff() {
        let canvas = document.getElementById('staffCanvas');
        let ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = "black"; ctx.lineWidth = 2;
        
        // 五線の配置 (startY = 160)
        const startY = 160; 
        for (let i = 0; i < 5; i++) {
            let y = startY + i * 40;
            ctx.beginPath(); ctx.moveTo(100, y); ctx.lineTo(700, y); ctx.stroke();
        }
        
        // ヘ音記号の描画：サイズ1.38倍 (140px * 1.38 ≒ 193px)
        // トップが第5線に接触し、点が第4線を挟む位置へ調整
        ctx.font = "193px Arial";
        ctx.fillText("𝄢", 20, 265); 
    }
        window.onload = setupStaff;

        function handlePianoClick(event) {
            userStartAudio();
            const id = event.target.id;
            const noteMap = {
                "key0": 32.70, "key1": 36.71, "key2": 41.20, "key3": 43.65, 
                "key4": 49.00, "key5": 55.00, "key6": 61.74, "key7": 65.41, 
                "key8": 73.42, "key9": 82.41, "key10": 87.31, "key11": 98.00, 
                "key12": 110.00, "key13": 123.47
            };
            if (noteMap[id]) {
                osc.freq(noteMap[id]); osc.amp(0.3, 0.02);
                setTimeout(() => osc.amp(0, 0.1), 100);
            }
        }
    </script>
</body>
</html>
