<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body style="text-align: center;">

    <div style="padding: 20px; font-size: 24px;">
        <button onclick="startGame()" style="font-size: 20px;">START</button>
        <span id="timeDisplay">Time: 60</span>
        <span id="yesScore">YES: 0</span>
        <span id="noScore">NO: 0</span>
    </div>

    <canvas id="staffCanvas" width="800" height="250"></canvas>
    
    <!-- ここに鍵盤を置きます -->
    <div id="pianoContainer"></div>

    <script>
        let osc, currentTargetKeyId = "", yesCount = 0, noCount = 0;
        
        // 音符の座標 (y=180:下第1間/ド, 160:第1線/レ, 140:第1間/ミ, 120:第2線/ファ, 100:第2間/ソ)
        const notes = [
            { id: "key0", y: 180 }, { id: "key2", y: 160 }, { id: "key4", y: 140 }, 
            { id: "key5", y: 120 }, { id: "key7", y: 100 }
        ];

        function setup() { 
            createCanvas(1, 1); // ダミー
            osc = new p5.Oscillator('triangle'); osc.start(); osc.amp(0);
            drawStaff();
            createPiano();
        }

        function createPiano() {
            let container = document.getElementById('pianoContainer');
            let svg = '<svg onclick="handlePianoClick(event)" width="800" height="150" viewBox="0 0 800 150">';
            for(let i=0; i<15; i++) svg += `<rect id="key${i}" x="${i*50}" y="0" width="48" height="150" fill="white" stroke="black"/>`;
            svg += '</svg>';
            container.innerHTML = svg;
        }

        function drawStaff() {
            let ctx = document.getElementById('staffCanvas').getContext('2d');
            ctx.clearRect(0, 0, 800, 250);
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath(); ctx.moveTo(100, 100 + i * 40); ctx.lineTo(700, 100 + i * 40); ctx.stroke();
            }
            ctx.font = "80px Arial"; ctx.fillText("𝄢", 20, 210);
        }

        function showNextNote() {
            drawStaff();
            let ctx = document.getElementById('staffCanvas').getContext('2d');
            let n = notes[Math.floor(Math.random() * notes.length)];
            ctx.font = "40px Arial"; ctx.fillText("○", 350, n.y);
            currentTargetKeyId = n.id;
        }

        function handlePianoClick(event) {
            userStartAudio();
            let id = event.target.id;
            let freqs = { "key0": 65.4, "key2": 73.4, "key4": 82.4, "key5": 87.3, "key7": 98.0 };
            if (freqs[id]) {
                osc.freq(freqs[id]); osc.amp(0.3, 0.05);
                setTimeout(() => osc.amp(0, 0.1), 100);
                if (id === currentTargetKeyId) { yesCount++; document.getElementById('yesScore').innerText = "YES: " + yesCount; }
                else { noCount++; document.getElementById('noScore').innerText = "NO: " + noCount; }
                showNextNote();
            }
        }
        function startGame() { yesCount=0; noCount=0; showNextNote(); }
    </script>
</body>
</html>
