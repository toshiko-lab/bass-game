<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body>
    <div id="game" style="font-size:30px; cursor:pointer; margin-top:50px;" onclick="startAudio();">クリックしてスタート</div>

    <svg id="piano" onclick="handlePianoClick(event)" width="1000" height="200" viewBox="0 0 1000 200" style="display:none; cursor:pointer;">
      <!-- 白鍵にID（key0〜key13）を付与しました -->
      <rect id="key0" x="0" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key1" x="71.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key2" x="142.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key3" x="214.2" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key4" x="285.6" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key5" x="357" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key6" x="428.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key7" x="499.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key8" x="571.2" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key9" x="642.6" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key10" x="714" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key11" x="785.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key12" x="856.8" width="71.4" height="200" fill="white" stroke="black" stroke-width="2"/>
      <rect id="key13" x="928.2" width="71.8" height="200" fill="white" stroke="black" stroke-width="2"/>

      <!-- 黒鍵にも念のためIDを付与しました -->
      <rect id="black0" x="50" y="0" width="40" height="120" fill="black"/>
      <rect id="black1" x="121" y="0" width="40" height="120" fill="black"/>
      <rect id="black2" x="263" y="0" width="40" height="120" fill="black"/>
      <rect id="black3" x="334" y="0" width="40" height="120" fill="black"/>
      <rect id="black4" x="405" y="0" width="40" height="120" fill="black"/>
      <rect id="black5" x="548" y="0" width="40" height="120" fill="black"/>
      <rect id="black6" x="619" y="0" width="40" height="120" fill="black"/>
      <rect id="black7" x="761" y="0" width="40" height="120" fill="black"/>
      <rect id="black8" x="832" y="0" width="40" height="120" fill="black"/>
      <rect id="black9" x="903" y="0" width="40" height="120" fill="black"/>
    </svg>

   <script>
        let osc;
        function setup() {
            osc = new p5.Oscillator('triangle');
            osc.start();
            osc.amp(0);
        }

        function startAudio() {
            userStartAudio(); // p5.jsの標準的な起動方法
            document.getElementById('game').style.display = 'none';
            document.getElementById('piano').style.display = 'block';
        }

        function playNote(freq) {
            osc.freq(freq); 
            osc.amp(0.3, 0.02);
            setTimeout(() => osc.amp(0, 0.1), 100);
        }

        function handlePianoClick(event) {
            const id = event.target.id;
            console.log("押された鍵盤のID:", id); // 動作確認用
            const noteMap = {
                "key0": 98.00,  // ソ (G2) - 全音
                "key2": 110.00, // ラ (A2) - 全音
                "key4": 123.47, // シ (B2) - 半音
                "key5": 130.81, // ド (C3) - 全音
                "key7": 146.83, // レ (D3) - 全音
                "key9": 164.81, // ミ (E3) - 半音
                "key10": 174.61,// ファ (F3) - 全音
                "key12": 196.00 // ソ (G3)
            };

            if (noteMap[id]) {
                playNote(noteMap[id]);
            }
        }
    </script>
</body>
</html>
