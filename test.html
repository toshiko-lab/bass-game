<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号 トレーニング</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        .score { font-size: 24px; margin-bottom: 20px; }
        canvas { background: white; margin-top: 10px; }
        svg { display: block; margin: 20px auto; }
    </style>
</head>
<body>

<div class="score">
    <button onclick="startGame()" style="font-size: 20px;">START</button>
    <span id="timeDisplay">Time: 60</span>
    <span id="yesScore" style="color:green;">YES: 0</span>
    <span id="noScore" style="color:red;">NO: 0</span>
</div>

<canvas id="staffCanvas" width="800" height="300"></canvas>
<div id="pianoContainer"></div>

<script>
    let timerInterval, yesCount, noCount, currentTargetId;
    const notes = [
        { id: "key0", y: 220 }, { id: "key2", y: 200 }, { id: "key4", y: 180 }, 
        { id: "key5", y: 160 }, { id: "key7", y: 140 }
    ];

    // 鍵盤の幅を「太く」固定しました
    function createPiano() {
        let s = '<svg onclick="check(event)" width="800" height="180" viewBox="0 0 800 180">';
        for(let i=0; i<8; i++) s += `<rect id="key${i*2}" x="${i*80}" width="75" height="180" fill="white" stroke="black"/>`;
        s += '</svg>';
        document.getElementById('pianoContainer').innerHTML = s;
    }

    function draw() {
        let ctx = document.getElementById('staffCanvas').getContext('2d');
        ctx.clearRect(0,0,800,300);
        ctx.lineWidth = 2;
        for(let i=0; i<5; i++) {
            ctx.beginPath(); ctx.moveTo(100, 100 + i*40); ctx.lineTo(700, 100 + i*40); ctx.stroke();
        }
        // ヘ音記号は画像が用意できるまで、テキストで代用せず一旦空欄にします。
        // もし特定の画像URLがあれば、そこに差し替えます。
    }

    function startGame() {
        yesCount=0; noCount=0;
        document.getElementById('yesScore').innerText = "YES: 0";
        document.getElementById('noScore').innerText = "NO: 0";
        let t = 60;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timeDisplay').innerText = "Time: " + t;
            if(t <= 0) clearInterval(timerInterval);
        }, 1000);
        showNote();
    }

    function showNote() {
        draw();
        let ctx = document.getElementById('staffCanvas').getContext('2d');
        let n = notes[Math.floor(Math.random()*notes.length)];
        ctx.beginPath(); ctx.ellipse(400, n.y, 25, 18, 0, 0, 7); ctx.stroke(); ctx.fill();
        currentTargetId = n.id;
    }

    function check(e) {
        if(!currentTargetId) return;
        if(e.target.id === currentTargetId) {
            yesCount++; document.getElementById('yesScore').innerText = "YES: " + yesCount;
        } else {
            noCount++; document.getElementById('noScore').innerText = "NO: " + noCount;
        }
        showNote();
    }

    window.onload = () => { draw(); createPiano(); };
</script>
</body>
</html>
