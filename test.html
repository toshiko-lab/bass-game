<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body style="text-align: center; font-family: sans-serif;">
    <div style="padding: 20px; font-size: 32px;">
        <button id="startBtn" onclick="startGame()" style="font-size: 28px;">START</button>
        <span id="timeDisplay">Time: 60</span>
        <span id="yesScore">YES: 0</span>
        <span id="noScore">NO: 0</span>
    </div>

    <canvas id="staffCanvas" width="800" height="350"></canvas>
    
    <svg id="piano" onclick="handlePianoClick(event)" width="1000" height="200" viewBox="0 0 1000 200" style="cursor:pointer;">
        <!-- 鍵盤のSVGパーツはここに以前のものを入れてください -->
    </svg>

    <script>
        let osc, timerInterval, currentTargetKeyId = "", yesCount = 0, noCount = 0;
        
        // ヘ音記号の正しい位置（線と線の間、または線の上）に微調整しました
        const notes = [
            { id: "key0", y: 220 }, // ド(C1)：下第1間
            { id: "key2", y: 200 }, // レ：第1線
            { id: "key4", y: 180 }, // ミ：第1間
            { id: "key5", y: 160 }, // ファ：第2線
            { id: "key7", y: 140 }  // ソ：第2間
        ];

        function setup() { osc = new p5.Oscillator('triangle'); osc.start(); osc.amp(0); }

        function drawStaff() {
            let ctx = document.getElementById('staffCanvas').getContext('2d');
            ctx.clearRect(0, 0, 800, 350);
            ctx.strokeStyle = "black"; ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath(); ctx.moveTo(100, 120 + i * 40); ctx.lineTo(700, 120 + i * 40); ctx.stroke();
            }
            ctx.font = "193px Arial"; ctx.fillText("𝄢", 20, 246);
        }

        function showNextNote() {
            drawStaff();
            let ctx = document.getElementById('staffCanvas').getContext('2d');
            let n = notes[Math.floor(Math.random() * notes.length)];
            ctx.font = "50px Arial";
            ctx.fillText("○", 350, n.y + 15); // 微調整
            currentTargetKeyId = n.id;
        }

        function handlePianoClick(event) {
            userStartAudio();
            let id = event.target.id;
            // 24鍵盤分すべての周波数を入れると、全鍵盤で音が鳴ります
            let noteMap = {
                "key0": 65.41, "key1": 69.30, "key2": 73.42, "key3": 77.78, "key4": 82.41, "key5": 87.31, "key6": 92.50, "key7": 98.00,
                "key8": 103.83, "key9": 110.00, "key10": 116.54, "key11": 123.47, "key12": 130.81, "key13": 138.59, "key14": 146.83, "key15": 155.56,
                "key16": 164.81, "key17": 174.61, "key18": 185.00, "key19": 196.00, "key20": 207.65, "key21": 220.00, "key22": 233.08, "key23": 246.94
            };
            
            if (noteMap[id]) {
                osc.freq(noteMap[id]); osc.amp(0.3, 0.05);
                setTimeout(() => osc.amp(0, 0.1), 100);
                
                if (id === currentTargetKeyId) {
                    yesCount++; document.getElementById('yesScore').innerText = "YES: " + yesCount;
                } else {
                    noCount++; document.getElementById('noScore').innerText = "NO: " + noCount;
                }
                showNextNote();
            }
        }
        window.onload = drawStaff;
    </script>
</body>
</html>
