<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
</head>
<body>
    <div id="game" style="cursor:pointer;" onclick="startAudio();">クリックしてスタート</div>

    <!-- 先生が送ってくださったSVGをそのまま配置します -->
    <svg id="piano" onclick="handlePianoClick(event)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" preserveAspectRatio="none" style="width:100%; display:none;">
      <!-- 白鍵 -->
      <rect x="0" width="71.4" height="200" fill="white" stroke="black" stroke-width="2" id="key1"/>
      <rect x="71.4" width="71.4" height="200" fill="white" stroke="black" stroke-width="2" id="key2"/>
      <!-- ...他の鍵盤も同様にIDを振ります... -->
      
      <!-- 黒鍵 -->
      <rect x="50" y="0" width="40" height="120" fill="black" id="black1"/>
      <!-- ...他の黒鍵も同様に... -->
    </svg>

    <script>
        let osc;
        function setup() { osc = new p5.Oscillator('triangle'); osc.start(); osc.amp(0); }
        function startAudio() {
            userStartAudio();
            document.getElementById('game').style.display = 'none';
            document.getElementById('piano').style.display = 'block';
        }
        
        function handlePianoClick(event) {
            // ここで「どのIDが押されたか」を判定して音を鳴らします
            let id = event.target.id;
            console.log(id + " が押されました");
            // 音を鳴らすロジックをここに書きます
        }
    </script>
</body>
</html>
