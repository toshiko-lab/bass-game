<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号 音読みトレーニング</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .score { font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        #gameArea { position: relative; display: inline-block; }
        /* いただいたヘ音記号を譜面の適切な位置に表示 */
        #bassClef { position: absolute; left: 10px; top: 35px; width: 80px; }
        canvas { background: white; border: 1px solid #ccc; display: block; }
    </style>
</head>
<body>

<div class="score">
    <button onclick="startGame()" style="font-size: 20px; padding: 10px 20px;">START</button>
    <span id="timeDisplay" style="margin: 0 20px;">Time: 60</span>
    <span id="yesScore" style="color:green;">YES: 0</span>
    <span id="noScore" style="color:red;">NO: 0</span>
</div>

<div id="gameArea">
    <img id="bassClef" src="bass.png" alt="ヘ音記号">
    <canvas id="staffCanvas" width="800" height="300"></canvas>
</div>

<div id="pianoContainer"></div>

<script>
    let timerInterval, yesCount, noCount, currentTargetId;
    const notes = [
        { id: "key0", y: 220 }, { id: "key2", y: 200 }, { id: "key4", y: 180 }, 
        { id: "key5", y: 160 }, { id: "key7", y: 140 }
    ];

    // 鍵盤：白鍵と黒鍵を配置
    function createPiano() {
        let s = '<svg onclick="check(event)" width="800" height="150" viewBox="0 0 800 150">';
        // 白鍵
        for(let i=0; i<14; i++) s += `<rect id="key${i*2}" x="${i*55}" width="50" height="150" fill="white" stroke="black"/>`;
        // 黒鍵
        let blackKeys = [1, 3, 6, 8, 10, 13, 15, 17, 20, 22];
        blackKeys.forEach(i => {
            let x = (i/2 * 55) - 15;
            s += `<rect id="key${i}" x="${x}" width="30" height="90" fill="black"/>`;
        });
        s += '</svg>';
        document.getElementById('pianoContainer').innerHTML = s;
    }

    function drawStaff() {
        let ctx = document.getElementById('staffCanvas').getContext('2d');
        ctx.clearRect(0,0,800,300);
        ctx.lineWidth = 2;
        for(let i=0; i<5; i++) {
            ctx.beginPath(); ctx.moveTo(50, 100 + i*40); ctx.lineTo(750, 100 + i*40); ctx.stroke();
        }
    }

    function startGame() {
        yesCount=0; noCount=0;
        document.getElementById('yesScore').innerText = "YES: 0";
        document.getElementById('noScore').innerText = "NO: 0";
        let t = 60;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timeDisplay').innerText = "Time: " + t;
            if(t <= 0) clearInterval(timerInterval);
        }, 1000);
        showNote();
    }

    function showNote() {
        drawStaff();
        let ctx = document.getElementById('staffCanvas').getContext('2d');
        let n = notes[Math.floor(Math.random()*notes.length)];
        ctx.beginPath(); ctx.ellipse(400, n.y, 25, 18, 0, 0, 7); ctx.stroke(); ctx.fill();
        currentTargetId = n.id;
    }

    function check(e) {
        if(!currentTargetId || e.target.id.indexOf('key') === -1) return;
        if(e.target.id === currentTargetId) {
            yesCount++; document.getElementById('yesScore').innerText = "YES: " + yesCount;
        } else {
            noCount++; document.getElementById('noScore').innerText = "NO: " + noCount;
        }
        showNote();
    }

    window.onload = () => { drawStaff(); createPiano(); };
</script>
</body>
</html>
