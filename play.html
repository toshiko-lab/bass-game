<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヘ音記号ゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        .container { background: white; width: 400px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        #staff { width: 360px; height: 160px; border: 1px solid #ccc; margin: 10px auto; position: relative; }
        .line { width: 100%; height: 1px; background: black; position: absolute; }
        .key { width: 35px; height: 100px; background: white; border: 1px solid #000; display: inline-block; vertical-align: top; }
        #note { width: 13px; height: 10px; border: 2px solid #000; border-radius: 50%; position: absolute; left: 180px; top: 90px; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="timer">01:00</h1>
    <button onclick="start()">スタート</button>
    <div id="staff">
        <div class="line" style="top:40px;"></div><div class="line" style="top:60px;"></div>
        <div class="line" style="top:80px;"></div><div class="line" style="top:100px;"></div>
        <div class="line" style="top:120px;"></div>
        <div style="position:absolute; top:35px; left:20px; font-size:50px;">𝄢</div>
        <div id="note"></div>
    </div>
    <div id="piano"></div>
    <div id="score" style="margin-top:10px;">せいかい：0回 ｜ まちがい：0回</div>
</div>

<script>
    const piano = document.getElementById('piano');
    for(let i=0; i<10; i++) {
        let div = document.createElement('div');
        div.className = 'key';
        div.onclick = () => {
            document.getElementById('score').innerText = "タップしたよ！";
        };
        piano.appendChild(div);
    }
    function start() { document.getElementById('timer').innerText = "01:00"; }
</script>
</body>
</html>
