<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヘ音記号ゲーム</title>
    <style>
        .key { width: 35px; height: 100px; background: white; border: 1px solid #000; display: inline-block; }
    </style>
</head>
<body style="text-align:center; font-family:sans-serif;">
    <h1 id="timer">01:00</h1>
    <button onclick="start()" style="padding:10px;">スタート</button>
    <div id="status" style="margin:20px;">スタートを押してね</div>
    <div id="piano"></div>

<script>
    const piano = document.getElementById('piano');
    for(let i=0; i<10; i++) {
        let div = document.createElement('div');
        div.className = 'key';
        div.onclick = () => document.getElementById('status').innerText = "音" + (i+1) + " をタップしたね！";
        piano.appendChild(div);
    }
    function start() { document.getElementById('status').innerText = "ゲーム開始！"; }
</script>
</body>
</html>
