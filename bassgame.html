<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号ゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        .container { background: white; width: 450px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        
        #staff { width: 360px; height: 160px; border: 1px solid #ccc; margin: 10px auto; position: relative; background: white; }
        .line { width: 100%; height: 1px; background: black; position: absolute; }
        #note { width: 22px; height: 16px; border: 2px solid #000; border-radius: 50%; position: absolute; left: 170px; background: white; transition: top 0.1s; }
        #clef { position: absolute; left: 20px; top: 25px; font-size: 80px; line-height: 1; }

        /* ピアノ：白鍵の線を重ねて1本に見せる設定 */
        .piano { display: flex; justify-content: center; margin-top: 20px; height: 120px; }
        .white-key { width: 40px; height: 120px; background: white; border: 1px solid #000; margin-left: -1px; cursor: pointer; z-index: 1; }
        .black-key { width: 25px; height: 80px; background: black; margin-left: -12px; margin-right: -13px; z-index: 2; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="start()">スタート</button>
    <div id="staff">
        <div class="line" style="top:40px;"></div><div class="line" style="top:60px;"></div>
        <div class="line" style="top:80px;"></div><div class="line" style="top:100px;"></div>
        <div class="line" style="top:120px;"></div>
        <div id="clef">𝄢</div>
        <div id="note" style="top:90px;"></div>
    </div>
    
    <div class="piano" id="piano">
        <div class="white-key" onclick="check(0)"></div>
        <div class="black-key" onclick="check(0.5)"></div>
        <div class="white-key" onclick="check(1)"></div>
        <div class="black-key" onclick="check(1.5)"></div>
        <div class="white-key" onclick="check(2)"></div>
        <div class="white-key" onclick="check(3)"></div>
        <div class="black-key" onclick="check(3.5)"></div>
        <div class="white-key" onclick="check(4)"></div>
        <div class="black-key" onclick="check(4.5)"></div>
        <div class="white-key" onclick="check(5)"></div>
        <div class="black-key" onclick="check(5.5)"></div>
        <div class="white-key" onclick="check(6)"></div>
        <div class="white-key" onclick="check(7)"></div>
        <div class="black-key" onclick="check(7.5)"></div>
        <div class="white-key" onclick="check(8)"></div>
        <div class="black-key" onclick="check(8.5)"></div>
        <div class="white-key" onclick="check(9)"></div>
    </div>
    <div id="score" style="margin-top:20px;">スタートを押してね</div>
</div>

<script>
    // 音符の縦位置を10個設定
    const notePositions = [115, 105, 95, 85, 75, 65, 55, 45, 35, 25];
    let currentTarget = 0;

    function check(i) {
        if(i === currentTarget) {
            alert("せいかい！");
            nextQuestion();
        } else {
            document.getElementById('score').innerText = "まちがい...";
        }
    }

    function nextQuestion() {
        currentTarget = Math.floor(Math.random() * 10);
        document.getElementById('note').style.top = notePositions[currentTarget] + "px";
        document.getElementById('score').innerText = "ゲーム中！";
    }

    function start() { nextQuestion(); }
</script>
</body>
</html>
