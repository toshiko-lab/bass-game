<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ヘ音記号ゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        .container { background: white; width: 450px; margin: 20px auto; padding: 20px; border-radius: 10px; }
        
        #staff { width: 360px; height: 160px; border: 1px solid #ccc; margin: 10px auto; position: relative; background: white; }
        .line { width: 100%; height: 1px; background: black; position: absolute; }
        #note { width: 22px; height: 16px; border: 2px solid #000; border-radius: 50%; position: absolute; left: 170px; background: white; }
        #clef { position: absolute; left: 20px; top: 25px; font-size: 80px; line-height: 1; }

        /* ピアノ：黒鍵が重なるように設定 */
        .piano-wrapper { display: inline-block; position: relative; margin-top: 20px; }
        .white-key { width: 40px; height: 120px; background: white; border: 1px solid #000; display: inline-block; cursor: pointer; }
        .black-key { width: 25px; height: 80px; background: black; position: absolute; top: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="timer">01:00</h1>
    <button onclick="start()">スタート</button>
    <div id="staff">
        <div class="line" style="top:40px;"></div><div class="line" style="top:60px;"></div>
        <div class="line" style="top:80px;"></div><div class="line" style="top:100px;"></div>
        <div class="line" style="top:120px;"></div>
        <div id="clef">𝄢</div>
        <div id="note"></div>
    </div>
    
    <div class="piano-wrapper" id="piano">
        <div class="white-key" onclick="check(0)" style="left:0px;"></div>
        <div class="black-key" style="left:28px;"></div>
        <div class="white-key" onclick="check(1)" style="left:40px;"></div>
        <div class="black-key" style="left:68px;"></div>
        <div class="white-key" onclick="check(2)" style="left:80px;"></div>
        <div class="white-key" onclick="check(3)" style="left:120px;"></div>
        <div class="black-key" style="left:148px;"></div>
        <div class="white-key" onclick="check(4)" style="left:160px;"></div>
        <div class="black-key" style="left:188px;"></div>
        <div class="white-key" onclick="check(5)" style="left:200px;"></div>
        <div class="black-key" style="left:228px;"></div>
        <div class="white-key" onclick="check(6)" style="left:240px;"></div>
        <div class="white-key" onclick="check(7)" style="left:280px;"></div>
        <div class="black-key" style="left:308px;"></div>
        <div class="white-key" onclick="check(8)" style="left:320px;"></div>
        <div class="black-key" style="left:348px;"></div>
        <div class="white-key" onclick="check(9)" style="left:360px;"></div>
    </div>
    <div id="score" style="margin-top:20px;">スタートを押してね</div>
</div>

<script>
    const notePositions = [115, 105, 95, 85, 75, 65, 55, 45, 35, 25];
    let currentTarget = 0;

    function check(i) {
        if(i === currentTarget) alert("せいかい！");
        nextQuestion();
    }

    function nextQuestion() {
        currentTarget = Math.floor(Math.random() * 10);
        document.getElementById('note').style.top = notePositions[currentTarget] + "px";
    }

    function start() {
        nextQuestion();
        document.getElementById('score').innerText = "ゲーム中！";
    }
</script>
</body>
</html>
